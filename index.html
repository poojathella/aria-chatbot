<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Chat Window -->
<div class="chat-window">

  <!-- Header -->
  <div class="chat-header">
    <div class="hd-av">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="5" fill="none" stroke="#3d8ef0" stroke-width="1.2"/>
        <path d="M12 3L12 7M12 17L12 21M3 12L7 12M17 12L21 12" stroke="#3d8ef0" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="2" fill="#3d8ef0"/>
      </svg>
    </div>
    <div class="hd-info">
      <div class="hd-name">ARIA</div>
      <div class="hd-sub">
        <span class="dot off" id="sdot"></span>
        <span id="slabel">Loading...</span>
      </div>
    </div>
    <div class="hd-btns">
      <button class="hd-btn" onclick="clearChat()" title="Clear chat">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M2 4h12M5.5 4V3a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 .5.5v1m2 0v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Suggestion Chips -->
  <div class="sugg-bar">
    <div class="chip" onclick="go('What can you help me with?')">✦ Capabilities</div>
    <div class="chip" onclick="go('Explain quantum computing simply')">⚛ Quantum computing</div>
    <div class="chip" onclick="go('Write a Python function to reverse a string')">⌂ Write code</div>
    <div class="chip" onclick="go('What are the biggest AI trends in 2026?')">◈ AI in 2026</div>
    <div class="chip" onclick="go('Help me write a professional email')">✉ Draft email</div>
    <div class="chip" onclick="go('Give me a creative story opening line')">✍ Creative writing</div>
  </div>

  <!-- Messages Area -->
  <div class="msgs" id="msgs">
    <div class="welcome" id="welcome">
      <div class="wicon">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
          <circle cx="17" cy="17" r="7" fill="none" stroke="#3d8ef0" stroke-width="1.4"/>
          <path d="M17 5L17 10M17 24L17 29M5 17L10 17M24 17L29 17" stroke="#3d8ef0" stroke-width="1.4" stroke-linecap="round"/>
          <circle cx="17" cy="17" r="3" fill="#3d8ef0"/>
        </svg>
      </div>
      <div class="wtitle">Hello, I'm ARIA</div>
      <div class="wsub">Powered by Groq AI — blazing fast and completely free. Ask me anything.</div>
      <div class="wchips">
        <div class="wchip" onclick="go('Explain machine learning in simple terms')">Machine learning basics</div>
        <div class="wchip" onclick="go('Help me brainstorm a unique startup idea')">Startup brainstorm</div>
        <div class="wchip" onclick="go('What makes great product design?')">Product design principles</div>
        <div class="wchip" onclick="go('Write a haiku about the night sky')">Write me a haiku</div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing" id="typing">
      <div class="av bot">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="3" fill="none" stroke="#3d8ef0" stroke-width="1.2"/>
          <circle cx="8" cy="8" r="1.2" fill="#3d8ef0"/>
        </svg>
      </div>
      <div class="tdots">
        <div class="d"></div>
        <div class="d"></div>
        <div class="d"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div class="sbar" id="sbar">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="7" cy="7" r="2.5" fill="currentColor" opacity=".6"/>
    </svg>
    <span id="stxt">Loading...</span>
  </div>

  <!-- Input Area -->
  <div class="iarea">
    <div class="irow">
      <textarea id="inp" placeholder="Ask ARIA anything..." rows="1" autocomplete="off"></textarea>
      <div class="iacts">
        <button class="ibtn sec" id="vbtn" title="Voice input" onclick="toggleVoice()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="5.5" y="1" width="5" height="8" rx="2.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M2.5 8.5A5.5 5.5 0 0 0 8 14a5.5 5.5 0 0 0 5.5-5.5M8 14v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="ibtn sec" id="tbtn" title="Text-to-speech" onclick="toggleTTS()">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 5.5H1.5a.5.5 0 0 0-.5.5v4a.5.5 0 0 0 .5.5H3l3.5 3V2.5L3 5.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M9.5 6a2.5 2.5 0 0 1 0 4M11 4a5 5 0 0 1 0 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="ibtn send" id="sbtn" onclick="send()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M13.5 7.5L2 1l2.5 6.5L2 14l11.5-6.5z" fill="white"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
